<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林清雪 | 个人博客</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F3F0E6] text-[#6A6456]">

    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 z-50 h-20 bg-[#F3F0E6]/95 backdrop-blur-sm border-b border-[#DCCFB8]">
        <div class="max-w-7xl mx-auto px-6 h-full flex items-center justify-between">
            <a href="index.html" class="text-xl font-semibold text-[#3F3A33] tracking-tight" style="font-family: 'Playfair Display', serif;">
                林清雪
            </a>
            
            <!-- 桌面端导航 -->
            <div class="hidden md:flex items-center gap-8">
                <a href="#home" class="text-sm font-medium text-[#6A6456] hover:text-[#C49A5A] transition-colors">首页</a>
                <a href="#articles" class="text-sm font-medium text-[#6A6456] hover:text-[#C49A5A] transition-colors">文章</a>
                <a href="#contact" class="text-sm font-medium text-[#6A6456] hover:text-[#C49A5A] transition-colors">联系</a>
            </div>

            <!-- 移动端菜单按钮 -->
            <button onclick="toggleMobileMenu()" class="md:hidden w-10 h-10 flex items-center justify-center text-[#3F3A33] focus:outline-none">
                <iconify-icon id="menu-icon" icon="lucide:menu" width="24" height="24"></iconify-icon>
            </button>
        </div>

        <!-- 移动端下拉菜单 -->
        <div id="mobile-menu" class="mobile-menu md:hidden absolute top-20 left-0 right-0 bg-[#F3F0E6] border-b border-[#DCCFB8] shadow-lg">
            <div class="flex flex-col px-6 py-4 space-y-4">
                <a href="#home" class="text-base font-medium text-[#6A6456] hover:text-[#C49A5A] transition-colors">首页</a>
                <a href="#articles" class="text-base font-medium text-[#6A6456] hover:text-[#C49A5A] transition-colors">文章</a>
                <a href="#contact" class="text-base font-medium text-[#6A6456] hover:text-[#C49A5A] transition-colors">联系</a>
            </div>
        </div>
    </nav>

    <!-- Hero 区域 -->
    <section id="home" class="min-h-screen flex items-center pt-20">
        <div class="max-w-7xl mx-auto px-6 py-16 md:py-24 w-full">
            <div class="flex flex-col md:flex-row items-center gap-10 md:gap-16">
                <div class="flex-shrink-0">
                    <img 
                        src="https://picsum.photos/seed/avatar-blog/400/400.jpg" 
                        alt="头像"
                        class="w-52 h-52 md:w-64 md:h-64 lg:w-80 lg:h-80 rounded-full object-cover border-4 border-[#DCCFB8] shadow-lg"
                    >
                </div>
                <div class="text-center md:text-left">
                    <p class="text-xs md:text-sm font-medium text-[#C49A5A] uppercase tracking-widest mb-3 md:mb-4">作家 · 设计师 · 旅行者</p>
                    <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-medium text-[#3F3A33] tracking-tight leading-tight mb-4 md:mb-6">
                        你好，我是<br>林清雪
                    </h1>
                    <p class="text-base md:text-lg font-light leading-relaxed text-[#6A6456]/80 max-w-xl mb-6 md:mb-8">
                        一个热爱文字与生活的记录者。在这里分享我的所见所闻、所思所想，记录生活中的点滴美好。
                    </p>
                    <div class="flex items-center justify-center md:justify-start gap-3 md:gap-4">
                        <a href="#articles" class="inline-flex items-center gap-2 px-6 md:px-8 py-2.5 md:py-3 bg-[#3F3A33] text-[#F3F0E6] text-sm font-medium rounded hover:bg-[#2A2621] transition-colors">
                            阅读文章
                            <iconify-icon icon="lucide:arrow-right" width="16" height="16"></iconify-icon>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 精选文章区域 -->
    <section id="articles" class="py-16 md:py-24 bg-[#FCFBF5]">
        <div class="max-w-7xl mx-auto px-6">
            <div class="text-center mb-12 md:mb-16">
                <p class="text-xs font-semibold text-[#C49A5A] uppercase tracking-widest mb-3 md:mb-4">最新作品</p>
                <h2 class="text-2xl md:text-3xl lg:text-4xl font-medium text-[#3F3A33] tracking-tight">精选文章</h2>
            </div>
            
            <!-- 文章网格 -->
            <div id="articles-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                <div class="col-span-full text-center py-12 text-[#6A6456]/60">
                    文章加载中...
                </div>
            </div>
        </div>
    </section>

    <!-- 引言区域 -->
    <section class="py-16 md:py-24 bg-[#3F3A33]">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <iconify-icon icon="lucide:quote" width="36" height="36" class="md:w-12 md:h-12 text-[#C49A5A] opacity-50 mb-4 md:mb-6"></iconify-icon>
            <blockquote class="text-xl md:text-2xl lg:text-3xl font-medium text-[#F3F0E6] leading-relaxed mb-4 md:mb-6" style="font-family: 'Playfair Display', serif;">
                "生活不是等待暴风雨过去，而是学会在雨中翩翩起舞。"
            </blockquote>
            <p class="text-xs md:text-sm text-[#F3F0E6]/60">— 维维安·格林</p>
        </div>
    </section>

    <!-- 订阅区域 -->
    <section id="contact" class="py-16 md:py-24 bg-[#FCFBF5]">
        <div class="max-w-2xl mx-auto px-6 text-center">
            <p class="text-xs font-semibold text-[#C49A5A] uppercase tracking-widest mb-3 md:mb-4">订阅通讯</p>
            <h2 class="text-2xl md:text-3xl lg:text-4xl font-medium text-[#3F3A33] tracking-tight mb-3 md:mb-4">不错过每一篇精彩</h2>
            <p class="text-sm md:text-base font-light text-[#6A6456]/80 mb-6 md:mb-8">订阅我的邮件通讯，第一时间获取最新文章。</p>
            <form class="flex flex-col sm:flex-row gap-3 md:gap-4 max-w-md mx-auto">
                <input type="email" placeholder="输入你的邮箱地址" class="flex-1 px-4 py-3 bg-[#F3F0E6] border border-[#DCCFB8] rounded text-sm focus:border-[#C49A5A] focus:outline-none transition-colors">
                <button type="submit" class="px-8 py-3 bg-[#C49A5A] text-white text-sm font-medium rounded hover:bg-[#B08B4E] transition-colors">订阅</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#3F3A33] py-12 md:py-16">
        <div class="max-w-7xl mx-auto px-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 md:gap-12 mb-8 md:mb-12">
                <div class="md:col-span-2 text-center md:text-left">
                    <a href="index.html" class="text-xl font-semibold text-[#F3F0E6] tracking-tight inline-block mb-3 md:mb-4" style="font-family: 'Playfair Display', serif;">林清雪</a>
                    <p class="text-sm text-[#F3F0E6]/60 leading-relaxed max-w-sm mx-auto md:mx-0">用文字记录生活的温度，分享关于旅行、阅读、艺术与日常的美好。</p>
                </div>
                <div class="text-center md:text-left">
                    <h4 class="text-sm font-medium text-[#F3F0E6] mb-3 md:mb-4">关注我</h4>
                    <div class="flex items-center justify-center md:justify-start gap-4">
                        <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full bg-[#F3F0E6]/10 text-[#F3F0E6]/60 hover:bg-[#C49A5A] hover:text-white transition-all">
                            <iconify-icon icon="lucide:twitter" width="18" height="18"></iconify-icon>
                        </a>
                        <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full bg-[#F3F0E6]/10 text-[#F3F0E6]/60 hover:bg-[#C49A5A] hover:text-white transition-all">
                            <iconify-icon icon="lucide:instagram" width="18" height="18"></iconify-icon>
                        </a>
                        <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full bg-[#F3F0E6]/10 text-[#F3F0E6]/60 hover:bg-[#C49A5A] hover:text-white transition-all">
                            <iconify-icon icon="lucide:github" width="18" height="18"></iconify-icon>
                        </a>
                    </div>
                </div>
            </div>
            <div class="pt-8 border-t border-[#F3F0E6]/10 flex flex-col md:flex-row items-center justify-between gap-4">
                <p class="text-xs text-[#F3F0E6]/40">© 2024 林清雪. 保留所有权利.</p>
            </div>
        </div>
    </footer>

    <!-- 回到顶部按钮 -->
    <a href="#home" class="fixed bottom-6 right-6 md:bottom-8 md:right-8 w-10 h-10 md:w-12 md:h-12 flex items-center justify-center bg-[#3F3A33] text-[#F3F0E6] rounded-full shadow-lg hover:bg-[#C49A5A] transition-colors">
        <iconify-icon icon="lucide:arrow-up" width="18" height="18"></iconify-icon>
    </a>

    <script src="script.js"></script>
</body>
</html>
